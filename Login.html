
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Pension Verification System</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { background: linear-gradient(160deg, #1a5276 0%, #2471a3 50%, #f4f6f8 50%); min-height: 100vh; }
    .login-wrap { max-width: 460px; margin: 0 auto; padding: 50px 20px 40px; }
    .back-link { color: white; font-weight: 700; text-decoration: none; font-size: 16px; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 24px; }
    .back-link:hover { opacity: 0.8; }
    .login-card { background: white; border-radius: 20px; padding: 36px 30px; box-shadow: 0 12px 40px rgba(0,0,0,0.18); }
    .login-card h1 { color: #1a5276; font-size: 26px; font-weight: 800; margin-bottom: 6px; }
    .login-card .subtitle { color: #666; font-size: 15px; margin-bottom: 28px; }
    .forgot-link { display: block; text-align: right; color: #1a5276; font-size: 15px; font-weight: 700; text-decoration: underline; margin-top: 6px; cursor: pointer; }
    .pin-display { display: flex; gap: 10px; margin: 8px 0 6px; }
    .pin-dot { width: 18px; height: 18px; border-radius: 50%; background: #d0d0d0; transition: background 0.2s; }
    .pin-dot.filled { background: #1a5276; }
    .error-msg { display: none; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <a href="welcome.html" class="back-link">← Back</a>
    <div class="login-card">
      <h1>🔐 Login</h1>
      <p class="subtitle">Simple &amp; secure login for elderly people</p>

      <div class="alert alert-info" style="margin-bottom:20px">
        ℹ️ Enter your <strong>ID Number</strong> and <strong>PIN</strong> to continue.
      </div>

      <div class="form-group">
        <label for="id-number">🪪 ID Number (Omang)</label>
        <input type="text" id="id-number" placeholder="e.g. 123456789" maxlength="9" inputmode="numeric"/>
        <p class="form-hint">Enter the number on your Omang card</p>
      </div>

      <div class="form-group">
        <label for="pin">🔑 PIN</label>
        <input type="password" id="pin" placeholder="Enter your PIN" maxlength="6" inputmode="numeric" oninput="updateDots(this.value)"/>
        <div class="pin-display" id="pin-dots">
          <div class="pin-dot" id="d1"></div>
          <div class="pin-dot" id="d2"></div>
          <div class="pin-dot" id="d3"></div>
          <div class="pin-dot" id="d4"></div>
          <div class="pin-dot" id="d5"></div>
          <div class="pin-dot" id="d6"></div>
        </div>
        <a class="forgot-link" href="#">Forgot PIN?</a>
      </div>

      <div class="alert alert-error error-msg" id="error-msg">❌ Incorrect ID or PIN. Please try again.</div>

      <button class="btn-primary" style="width:100%;text-align:center" onclick="doLogin()">
        Login →
      </button>

      <div style="text-align:center;margin-top:20px;font-size:15px;color:#666">
        Don't have an account? <a href="register.html" style="color:#1a5276;font-weight:700">Register here</a>
      </div>
    </div>
  </div>
  <script>
    function updateDots(val) {
      for(let i=1;i<=6;i++) {
        document.getElementById('d'+i).classList.toggle('filled', i<=val.length);
      }
    }
    function doLogin() {
      const id = document.getElementById('id-number').value;
      const pin = document.getElementById('pin').value;
      const err = document.getElementById('error-msg');
      if(!id || !pin) { err.style.display='flex'; err.textContent='⚠️ Please enter both your ID number and PIN.'; return; }
      // Demo: any login works
      err.style.display='none';
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
